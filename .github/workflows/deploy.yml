name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: |
          echo "=== 开始构建 ==="
          npm run docs:build
          BUILD_EXIT_CODE=$?
          echo ""
          echo "=== 构建完成，退出码: $BUILD_EXIT_CODE ==="
          echo "=== 检查 docs 目录 ==="
          ls -la docs/
          echo ""
          echo "=== 检查 dist 目录 (outDir: ../dist) ==="
          ls -la docs/dist/ 2>/dev/null || echo "docs/dist 不存在"
          echo ""
          echo "=== 查找所有 dist 目录 ==="
          find . -name "dist" -type d 2>/dev/null | head -5
          exit $BUILD_EXIT_CODE
      
      - name: Check build output
        run: |
          echo "=== 检查构建输出 ==="
          if [ -d "docs/dist" ]; then
            echo "✓ dist 目录存在 (docs/dist)"
            ls -la docs/dist/ | head -20
          else
            echo "✗ dist 目录不存在"
            exit 1
          fi
      
      - name: Create deployment package
        run: |
          tar -czf dist.tar.gz docs/dist
      
      - name: Upload to server and extract
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/oi-knowledge-base
            # 备份旧版本
            mv dist dist.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
            # 等待文件传输完成
            sleep 2
      
      - name: Deploy dist via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist.tar.gz"
          target: "/var/www/oi-knowledge-base/"
      
      - name: Extract and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/oi-knowledge-base
            # 解压新构建的文件
            tar -xzf dist.tar.gz
            rm -rf dist
            mv docs/dist dist
            rm -rf docs
            rm -f dist.tar.gz
            # 重启 Nginx 容器
            docker-compose restart nginx
            echo "Deployment completed successfully!"
