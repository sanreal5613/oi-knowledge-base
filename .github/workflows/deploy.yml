name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: |
          echo "=== 开始构建 ==="
          npm run docs:build
          BUILD_EXIT_CODE=$?
          echo ""
          echo "=== 构建完成，退出码: $BUILD_EXIT_CODE ==="
          echo "=== 检查 docs 目录 ==="
          ls -la docs/
          echo ""
          echo "=== 检查 docs/.vitepress 目录 ==="
          ls -la docs/.vitepress/
          echo ""
          echo "=== 查找所有 dist 目录 ==="
          find . -name "dist" -type d 2>/dev/null | grep -v node_modules | head -10
          exit $BUILD_EXIT_CODE
      
      - name: Check build output
        run: |
          echo "=== 检查构建输出 ==="
          DIST_PATH=$(find . -name "dist" -type d 2>/dev/null | grep -v node_modules | head -1)
          if [ -n "$DIST_PATH" ]; then
            echo "✓ 找到 dist 目录: $DIST_PATH"
            ls -la "$DIST_PATH/" | head -20
            echo "DIST_PATH=$DIST_PATH" >> $GITHUB_ENV
          else
            echo "✗ 未找到 dist 目录"
            exit 1
          fi
      
      - name: Create deployment package
        run: |
          DIST_PATH=${DIST_PATH:-docs/.vitepress/dist}
          if [ -d "$DIST_PATH" ]; then
            tar -czf dist.tar.gz "$DIST_PATH"
          else
            echo "错误: dist 目录不存在"
            exit 1
          fi
      
      - name: Upload to server and extract
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/oi-knowledge-base
            # 备份旧版本
            mv dist dist.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
            # 等待文件传输完成
            sleep 2
      
      - name: Deploy dist via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist.tar.gz"
          target: "/var/www/oi-knowledge-base/"
      
      - name: Extract and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/oi-knowledge-base
            # 解压新构建的文件
            tar -xzf dist.tar.gz
            rm -rf dist
            # 查找解压后的 dist 目录
            if [ -d "docs/.vitepress/dist" ]; then
              mv docs/.vitepress/dist dist
              rm -rf docs
            elif [ -d "dist" ]; then
              # 已经是 dist 目录
              :
            else
              echo "错误: 找不到 dist 目录"
              exit 1
            fi
            rm -f dist.tar.gz
            # 重启 Nginx 容器
            docker-compose restart nginx
            echo "Deployment completed successfully!"
