name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run docs:build
      
      - name: Check build output
        run: |
          echo "=== 检查构建输出 ==="
          ls -la docs/.vitepress/
          if [ -d "docs/.vitepress/dist" ]; then
            echo "✓ dist 目录存在"
            ls -la docs/.vitepress/dist/ | head -20
          else
            echo "✗ dist 目录不存在，构建可能失败"
            exit 1
          fi
      
      - name: Create deployment package
        run: |
          ls -la docs/.vitepress/
          tar -czf dist.tar.gz docs/.vitepress/dist
      
      - name: Upload to server and extract
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/oi-knowledge-base
            # 备份旧版本
            mv dist dist.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
            # 等待文件传输完成
            sleep 2
      
      - name: Deploy dist via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist.tar.gz"
          target: "/var/www/oi-knowledge-base/"
      
      - name: Extract and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/oi-knowledge-base
            # 解压新构建的文件
            tar -xzf dist.tar.gz
            rm -rf dist
            mv docs/.vitepress/dist dist
            rm -rf docs
            rm -f dist.tar.gz
            # 重启 Nginx 容器
            docker-compose restart nginx
            echo "Deployment completed successfully!"
